<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
background:white;
font-family:sans-serif;
overflow-x:hidden;
}

section{
height:120vh;
display:flex;
justify-content:center;
align-items:center;
}

#message{
font-size:64px;
color:#ff2d55;
opacity:0;
transition:2s;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.balloon{
position:fixed;
bottom:-120px;
width:50px;
height:65px;
border-radius:50%;
}

.balloon:after{
content:"";
position:absolute;
width:2px;
height:40px;
background:#888;
left:50%;
top:65px;
}

</style>
</head>

<body>

<section></section>
<section></section>

<section id="message">
りつ<br>お誕生日おめでとう
</section>

<canvas id="confetti"></canvas>

<script>

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

for(let i=0;i<250;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+2,
speed:Math.random()*7+4,
color:`hsl(${Math.random()*360},100%,60%)`
});
}

function drawConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{

ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,c.size,c.size);

c.y+=c.speed;

if(c.y>canvas.height){
c.y=0;
c.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(drawConfetti);

}

function createBalloon(){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"%";

b.style.background=`hsl(${Math.random()*360},70%,65%)`;

document.body.appendChild(b);

let pos=-120;
let drift=(Math.random()*1.5)-0.75;

function float(){

pos+=1.5;

b.style.bottom=pos+"px";

b.style.transform=`translateX(${drift*pos}px)`;

if(pos<window.innerHeight+200){

requestAnimationFrame(float);

}else{

b.remove();

}

}

float();

}

let confettiStarted=false;
let balloonsStarted=false;

window.addEventListener("scroll",()=>{

let scroll=window.scrollY;

if(scroll>300 && !confettiStarted){

drawConfetti();

confettiStarted=true;

}

if(scroll>600 && !balloonsStarted){

balloonsStarted=true;

setInterval(createBalloon,300);

}

if(scroll>1000){

document.getElementById("message").style.opacity=1;

}

});

</script>

</body>
</html>
