<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

#text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
font-size:90px;
letter-spacing:5px;
opacity:0;
transition:1.5s;
z-index:2;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="text"></div>

<canvas id="laser"></canvas>

<script>

const canvas=document.getElementById("laser");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let lasers=[];

for(let i=0;i<20;i++){

lasers.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
angle:Math.random()*Math.PI*2,
speed:(Math.random()*0.02)+0.01,
color:`hsl(${Math.random()*360},100%,60%)`
});

}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

lasers.forEach(l=>{

l.angle+=l.speed;

let x2=l.x+Math.cos(l.angle)*1200;
let y2=l.y+Math.sin(l.angle)*1200;

let gradient=ctx.createLinearGradient(l.x,l.y,x2,y2);

gradient.addColorStop(0,l.color);
gradient.addColorStop(1,"transparent");

ctx.strokeStyle=gradient;
ctx.lineWidth=10;

ctx.beginPath();
ctx.moveTo(l.x,l.y);
ctx.lineTo(x2,y2);
ctx.stroke();

});

requestAnimationFrame(draw);

}

draw();

const text=document.getElementById("text");

function show(t){
text.innerHTML=t;
text.style.opacity=1;
}

function hide(){
text.style.opacity=0;
}

setTimeout(()=>{
show("りっちゅ");
},2000);

setTimeout(()=>{
hide();
},4500);

setTimeout(()=>{
show("お誕生日<br>おめでとう");
},6500);

</script>

</body>
</html>
