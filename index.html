<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:white;
overflow-x:hidden;
}

.section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
}

#start{
background:white;
}

#cracker{
background:#fff7f7;
font-size:60px;
opacity:0;
transition:1s;
}

#confetti{
background:#fdf6ff;
opacity:0;
transition:1s;
}

#message{
background:#fff0f5;
font-size:55px;
color:#ff4d6d;
opacity:0;
transition:1.5s;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<section class="section" id="start">
↓ スクロールしてね ↓
</section>

<section class="section" id="cracker">
🎉
</section>

<section class="section" id="confetti">
🎊
</section>

<section class="section" id="message">
りつ<br>お誕生日おめでとう
</section>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

for(let i=0;i<200;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*5+2,
speed:Math.random()*3+1,
color:`hsl(${Math.random()*360},100%,50%)`
});
}

function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{
ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,c.size,c.size);

c.y+=c.speed;

if(c.y>canvas.height){
c.y=0;
c.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(drawConfetti);
}

let confettiStarted=false;

window.addEventListener("scroll",()=>{

let cracker=document.getElementById("cracker");
let confettiSec=document.getElementById("confetti");
let message=document.getElementById("message");

let scrollY=window.scrollY;

if(scrollY>200){
cracker.style.opacity=1;
}

if(scrollY>600){
confettiSec.style.opacity=1;

if(!confettiStarted){
drawConfetti();
confettiStarted=true;
}
}

if(scrollY>1000){
message.style.opacity=1;
}

});

</script>

</body>
</html>
